[importlinter]
root_package = desloppify

[importlinter:contract:runtime_no_tests]
name = Runtime code does not import tests
type = forbidden
source_modules =
    desloppify.app
    desloppify.base
    desloppify.engine
    desloppify.intelligence
    desloppify.languages
forbidden_modules =
    desloppify.tests

[importlinter:contract:base_no_upward_imports]
name = Base layer does not import app/engine/intelligence/languages
type = forbidden
allow_indirect_imports = True
source_modules =
    desloppify.base
forbidden_modules =
    desloppify.app
    desloppify.engine
    desloppify.intelligence
    desloppify.languages
ignore_imports =
    desloppify.base.subjective_dimensions -> desloppify.intelligence.review.dimensions.data
    desloppify.base.subjective_dimensions -> desloppify.intelligence.review.dimensions.metadata
    desloppify.base.subjective_dimensions -> desloppify.languages
